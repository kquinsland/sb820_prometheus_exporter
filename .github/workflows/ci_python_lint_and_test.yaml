---
name: Python Lint and Test

on:
    # Should it be needed, allow manual triggering
    workflow_dispatch:
    # Allow calling from other GHA workflows.
    # See: https://docs.github.com/en/actions/sharing-automations/reusing-workflows#creating-a-reusable-workflow
    workflow_call:
    # As soon as an open PR has modified Python or its build metadata, run the checks.
    # This flow will re-run the checks if new commits are added to the PR.
    pull_request:
        paths:
            - "**.py"
            - ".github/workflows/ci_python_lint_and_test.yaml"
            - "Dockerfile"
            - "pyproject.toml"
            - "uv.lock"
# Start with no permissions, then allow per job/action
permissions: {}

env:
    PYTHON_VERSION: "3.14"

jobs:
    lint-format:
        name: Lint and Format with Ruff
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout Repo
              id: checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Install uv
              id: setup-uv
              uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
              with:
                  enable-cache: true
                  ignore-nothing-to-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              id: setup-python
              run: uv python install "$PYTHON_VERSION"

            - name: Check for lint violations
              id: check-lint-rules
              uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
              with:
                  args: check --output-format=github .

            - name: Check for formatting violations
              id: check-well-formatted
              uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
              # We explicitly do not fix here!
              # Show what would/should be changes and return non-zero if there are any.
              with:
                  args: format --check --diff .

    # Assuming code doesn't smell, make sure it (still) works.
    test:
        name: Run Pytest
        runs-on: ubuntu-latest
        permissions:
            contents: read
        # If any of the linting/formatting steps fail, do not run the tests.
        needs: lint-format
        env:
            # This is needed to make sure that the tests can find the package.
            PYTHONPATH: .

        steps:
            - name: Checkout repository
              id: checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Install uv
              id: setup-uv
              uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
              with:
                  enable-cache: true
                  ignore-nothing-to-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Set up Python
              id: setup-python
              run: uv python install "$PYTHON_VERSION"

            - name: Install the project
              id: install-dependencies
              run: uv sync --locked --python "$PYTHON_VERSION" --all-extras --dev

            - name: Run tests
              id: run-tests
              run: uv run --locked --python "$PYTHON_VERSION" pytest
