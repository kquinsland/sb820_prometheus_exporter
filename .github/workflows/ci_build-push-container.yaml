---
name: Build and Push Container

on:
  # Should it be needed, allow manual triggering
  workflow_dispatch:
  # Allow calling from other GHA workflows.
  # See: https://docs.github.com/en/actions/sharing-automations/reusing-workflows#creating-a-reusable-workflow
  workflow_call:

# Start with no permissions, then allow per job/action
permissions: {}

jobs:
  # Ideally, the release wouldn't be allowed to proceed if tests fail.
  # We need to handle the manual workflow_dispatch case, though so it doesn't
  #    hurt to have the tests run first, again.
  lint_test_python:
    uses: ./.github/workflows/ci_python_lint_and_test.yaml
    permissions:
      # Needed for the test job to run
      contents: read

  release_package:
    name: Build and Push Container
    runs-on: ubuntu-latest
    needs: lint_test_python
    ##
    # See: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        id: login-ghcr
        # See: https://github.com/docker/login-action/releases
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          # See: https://docs.github.com/en/actions/publishing-packages/publishing-docker-images#publishing-images-to-github-packages
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          labels: |
            org.opencontainers.image.description="Prometheus exporter for SB8200 cable modem stats"

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          # For now, I only have amd64 nodes in k8s cluster
          platforms: linux/amd64

          # Don't build/push on PRs
          push: ${{ github.event_name != 'pull_request' }}

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ steps.meta.outputs.vcs_ref }}
            VERSION=${{ steps.meta.outputs.version }}
